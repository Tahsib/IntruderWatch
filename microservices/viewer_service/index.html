<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IntruderWatch | Secure Viewer</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #0a0a0c;
            --bg-surface: #16161a;
            --bg-accent: #1f1f23;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f1f1f1;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
        }

        .sidebar {
            width: 260px;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 30vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
        }

        .brand {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .camera-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 24px;
        }

        .camera-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-dim);
        }

        .camera-item:hover {
            background-color: var(--bg-accent);
            color: var(--text-main);
        }

        .camera-item.active {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            font-weight: 600;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-deep);
            position: relative;
        }

        .topbar {
            height: 72px;
            background-color: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
        }

        @media (max-width: 768px) {
            .topbar { height: 60px; padding: 0 16px; }
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .date-select {
            background-color: var(--bg-accent);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            min-width: 160px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-dim);
            padding: 4px 10px;
            background: var(--bg-accent);
            border-radius: 20px;
        }

        .status-badge.active::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        @media (max-width: 480px) {
            .image-grid { grid-template-columns: 1fr; }
            .content { padding: 12px; }
        }

        .image-card {
            background-color: var(--bg-surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .image-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .image-wrapper {
            aspect-ratio: 16/9;
            background-color: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-card img.loaded { opacity: 1; }

        .card-footer {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-surface);
        }

        .timestamp {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .tag {
            font-size: 0.7rem;
            color: var(--text-dim);
            background: var(--bg-accent);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            flex-direction: column;
        }

        .lightbox.active { display: flex; }

        .lightbox-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-main);
        }

        .lightbox-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            touch-action: none;
        }

        .main-img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }

        .nav-btn:hover { background: var(--primary); }
        .prev-btn { left: 30px; }
        .next-btn { right: 30px; }

        @media (max-width: 768px) { .nav-btn { display: none; } }

        .close-btn { background: none; border: none; color: white; cursor: pointer; padding: 8px; }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            color: var(--text-dim);
            gap: 16px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--bg-accent); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">
            <i data-lucide="shield-check"></i>
            <span>IntruderWatch</span>
        </div>
        <div class="camera-list" id="cameraList"></div>
    </div>

    <div class="main">
        <header class="topbar">
            <div class="controls">
                <select class="date-select" id="dateSelect" disabled>
                    <option value="">Select Date</option>
                </select>
                <div class="status-badge" id="cameraStatus">
                    <i data-lucide="video"></i>
                    <span id="cameraNameDisplay">Standby</span>
                </div>
            </div>
            <div id="stats" class="status-badge">
                <span id="imageCount">0 Images</span>
            </div>
        </header>

        <main class="content" id="content">
            <div class="empty-state" id="initialState">
                <i data-lucide="search" size="48"></i>
                <p>Select a camera to begin monitoring</p>
            </div>
            <div class="image-grid" id="imageGrid"></div>
        </main>
    </div>

    <div class="lightbox" id="lightbox">
        <div class="lightbox-header">
            <div class="info">
                <div id="lightboxTime" style="font-weight: 600;"></div>
                <div id="lightboxFile" style="font-size: 0.75rem; color: var(--text-dim);"></div>
            </div>
            <button class="close-btn" onclick="closeLightbox()">
                <i data-lucide="x"></i>
            </button>
        </div>
        <div class="lightbox-content" id="lightboxContent">
            <button class="nav-btn prev-btn" onclick="navigate(-1)">
                <i data-lucide="chevron-left"></i>
            </button>
            <img id="mainImg" class="main-img" src="" alt="Capture">
            <button class="nav-btn next-btn" onclick="navigate(1)">
                <i data-lucide="chevron-right"></i>
            </button>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentCamera = localStorage.getItem('last_camera');
        let currentDate = localStorage.getItem('last_date');
        let allImages = [];
        let currentIndex = -1;
        let pollInterval = null;

        function getLocalDateStr() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        async function init() {
            await loadCameras();
            lucide.createIcons();
            
            document.getElementById('dateSelect').addEventListener('change', (e) => {
                currentDate = e.target.value;
                localStorage.setItem('last_date', currentDate);
                loadImages(true);
            });
            
            document.addEventListener('keydown', (e) => {
                if (!document.getElementById('lightbox').classList.contains('active')) return;
                if (e.key === 'ArrowLeft') navigate(-1);
                if (e.key === 'ArrowRight') navigate(1);
                if (e.key === 'Escape') closeLightbox();
            });

            // Restore previous state if exists
            if (currentCamera) {
                const camEl = Array.from(document.querySelectorAll('.camera-item'))
                    .find(el => el.dataset.id === currentCamera);
                if (camEl) {
                    await selectCamera(currentCamera, camEl, true);
                } else {
                    // Reset if saved camera no longer exists
                    currentCamera = null;
                    currentDate = null;
                }
            }

            // Start polling for new images
            pollInterval = setInterval(pollNewImages, 5000);
        }

        async function loadCameras() {
            try {
                const res = await fetch(`${API_BASE}/cameras`);
                const cameras = await res.json();
                const list = document.getElementById('cameraList');
                list.innerHTML = '';

                cameras.forEach(cam => {
                    const el = document.createElement('div');
                    el.className = 'camera-item';
                    el.dataset.id = cam;
                    el.innerHTML = `<i data-lucide="camera"></i><span>${cam.replace('camera_', 'Camera ')}</span>`;
                    el.onclick = () => selectCamera(cam, el);
                    list.appendChild(el);
                });
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        async function selectCamera(cam, el, isInitial = false) {
            currentCamera = cam;
            localStorage.setItem('last_camera', cam);
            document.querySelectorAll('.camera-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            document.getElementById('cameraNameDisplay').textContent = cam.replace('camera_', 'Camera ');
            document.getElementById('cameraStatus').classList.add('active');

            try {
                const res = await fetch(`${API_BASE}/cameras/${cam}/dates`);
                const dates = await res.json();
                const select = document.getElementById('dateSelect');
                select.innerHTML = '<option value="">Select Date</option>';
                dates.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d; opt.textContent = d;
                    select.appendChild(opt);
                });
                select.disabled = false;
                
                if (isInitial && currentDate && dates.includes(currentDate)) {
                    select.value = currentDate;
                } else if (dates.length > 0) {
                    currentDate = dates[0];
                    select.value = currentDate;
                    localStorage.setItem('last_date', currentDate);
                }
                
                loadImages(true);
            } catch (e) { console.error(e); }
        }

        async function loadImages(showSpinner = false) {
            if (!currentCamera || !currentDate) return;

            if (showSpinner) {
                document.getElementById('initialState').style.display = 'none';
                document.getElementById('imageGrid').innerHTML = '<div class="spinner"></div>';
            }

            try {
                const res = await fetch(`${API_BASE}/cameras/${currentCamera}/dates/${currentDate}/images`);
                const newImages = await res.json();
                
                const grid = document.getElementById('imageGrid');
                if (showSpinner) grid.innerHTML = ''; 

                const currentIds = new Set(newImages.map(img => `img-${img.replace(/[^a-zA-Z0-9]/g, '-')}`));
                
                // 1. Remove images that are no longer on the server
                Array.from(grid.children).forEach(child => {
                    if (child.id && !currentIds.has(child.id)) {
                        child.remove();
                    }
                });

                // 2. Add new images that aren't in the grid yet
                [...newImages].reverse().forEach(img => {
                    const id = `img-${img.replace(/[^a-zA-Z0-9]/g, '-')}`;
                    if (!document.getElementById(id)) {
                        const card = createImageCard(img);
                        card.id = id;
                        grid.insertBefore(card, grid.firstChild);
                    }
                });

                allImages = newImages;
                document.getElementById('imageCount').textContent = `${allImages.length} Captures`;
                document.getElementById('initialState').style.display = 'none';
                
                const spinner = grid.querySelector('.spinner');
                if (spinner) spinner.remove();

            } catch (e) { console.error(e); }
        }

        function createImageCard(img) {
            const url = `/images/${currentCamera}/${currentDate}/${img}`;
            const parts = img.split('_');
            const timePart = parts[1] || '';
            const timeOnly = timePart.includes(' ') ? timePart.split(' ')[1].split('.')[0] : 'Unknown';

            const card = document.createElement('div');
            card.className = 'image-card';
            card.innerHTML = `
                <div class="image-wrapper">
                    <div class="spinner" style="position:absolute"></div>
                    <img src="${url}" loading="lazy">
                </div>
                <div class="card-footer">
                    <span class="timestamp">${timeOnly}</span>
                    <div class="meta-tags"><span class="tag">AI Match</span></div>
                </div>
            `;
            
            const imgEl = card.querySelector('img');
            imgEl.onload = () => {
                imgEl.classList.add('loaded');
                const s = card.querySelector('.spinner');
                if (s) s.remove();
            };
            
            card.onclick = () => {
                const actualIndex = allImages.indexOf(img);
                openLightbox(actualIndex);
            };
            return card;
        }

        function renderGrid() {
            // This is now just a fallback, loadImages handles the heavy lifting
            loadImages(true);
        }

        async function pollNewImages() {
            if (!currentCamera || !currentDate) return;
            
            // For security/live monitoring, we should poll if it's "today"
            // Using a more robust local date check
            const localToday = getLocalDateStr();
            
            if (currentDate === localToday) {
                await loadImages(false);
            }
        }

        function openLightbox(index) {
            currentIndex = index;
            const img = allImages[index];
            const url = `/images/${currentCamera}/${currentDate}/${img}`;
            
            document.getElementById('mainImg').src = url;
            document.getElementById('lightboxTime').textContent = img.split('_')[1]?.split('.')[0] || 'Image';
            document.getElementById('lightboxFile').textContent = img;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function navigate(dir) {
            const nextIdx = currentIndex + dir;
            if (nextIdx >= 0 && nextIdx < allImages.length) {
                openLightbox(nextIdx);
            }
        }

        init();
    </script>
</body>
</html>
