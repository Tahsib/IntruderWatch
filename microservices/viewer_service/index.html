<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Camera Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 200px;
            background-color: #0d0d0d;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-title {
            padding: 16px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            color: #999;
            border-bottom: 1px solid #333;
        }

        .camera-list {
            flex: 1;
            overflow-y: auto;
        }

        .camera-item {
            padding: 12px 16px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }

        .camera-item:hover {
            background-color: #1a1a1a;
            border-left-color: #0066cc;
        }

        .camera-item.active {
            background-color: #1a1a1a;
            border-left-color: #00a8ff;
            color: #00a8ff;
        }

        /* Main content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top bar */
        .topbar {
            background-color: #0d0d0d;
            border-bottom: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .topbar-label {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .date-select {
            padding: 8px 12px;
            background-color: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            min-width: 150px;
        }

        .date-select:hover {
            border-color: #00a8ff;
        }

        .date-select:focus {
            outline: none;
            border-color: #00a8ff;
            box-shadow: 0 0 0 2px rgba(0, 168, 255, 0.2);
        }

        .camera-name {
            font-weight: bold;
            color: #00a8ff;
            margin-left: auto;
        }

        /* Image grid */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .image-item {
            aspect-ratio: 16 / 9;
            background-color: #2a2a2a;
            border: 1px solid #333;
            border-radius: 6px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.2s ease;
            position: relative;
        }

        .image-item:hover {
            border-color: #00a8ff;
            transform: scale(1.02);
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .image-item img.loaded {
            display: block;
        }

        .image-item-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 12px;
        }

        /* Load more button */
        .load-more {
            text-align: center;
            padding: 16px;
        }

        .load-more-btn {
            padding: 10px 24px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .load-more-btn:hover {
            background-color: #0052a3;
        }

        .load-more-btn:disabled {
            background-color: #333;
            cursor: not-allowed;
            color: #666;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background-color: rgba(0, 168, 255, 0.8);
        }

        .modal-info {
            position: absolute;
            bottom: 16px;
            left: 16px;
            color: #e0e0e0;
            font-size: 12px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 4px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00a8ff;
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-title">Cameras</div>
        <div class="camera-list" id="cameraList"></div>
    </div>

    <div class="main">
        <div class="topbar">
            <span class="topbar-label">Date</span>
            <select class="date-select" id="dateSelect" disabled>
                <option>Select a date...</option>
            </select>
            <span class="camera-name" id="cameraName">No camera selected</span>
        </div>

        <div class="content" id="content">
            <div class="empty-state">Select a camera to start</div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <img id="modalImage" class="modal-image" alt="Full image">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-info" id="modalInfo"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentCamera = null;
        let currentDate = null;
        let allImages = [];
        let displayedCount = 0;
        const IMAGES_PER_PAGE = 50;

        // Initialize
        async function init() {
            await loadCameras();
            document.getElementById('dateSelect').addEventListener('change', loadImages);
            document.getElementById('content').addEventListener('scroll', handleScroll);
            document.getElementById('modal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('modal')) closeModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });
        }

        async function loadCameras() {
            try {
                const response = await fetch(`${API_BASE}/cameras`);
                const cameras = await response.json();
                const cameraList = document.getElementById('cameraList');
                cameraList.innerHTML = '';

                cameras.forEach(camera => {
                    const div = document.createElement('div');
                    div.className = 'camera-item';
                    div.textContent = camera;
                    div.onclick = () => selectCamera(camera, div);
                    cameraList.appendChild(div);
                });
            } catch (error) {
                console.error('Error loading cameras:', error);
            }
        }

        async function selectCamera(camera, element) {
            currentCamera = camera;
            currentDate = null;
            allImages = [];
            displayedCount = 0;

            // Update active state
            document.querySelectorAll('.camera-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');

            document.getElementById('cameraName').textContent = camera;

            // Load dates
            try {
                const response = await fetch(`${API_BASE}/cameras/${camera}/dates`);
                const dates = await response.json();
                const dateSelect = document.getElementById('dateSelect');
                dateSelect.innerHTML = '<option value="">Select a date...</option>';
                dateSelect.disabled = false;

                dates.forEach(date => {
                    const option = document.createElement('option');
                    option.value = date;
                    option.textContent = date;
                    dateSelect.appendChild(option);
                });

                document.getElementById('content').innerHTML = '<div class="empty-state">Select a date to view images</div>';
            } catch (error) {
                console.error('Error loading dates:', error);
            }
        }

        async function loadImages() {
            const dateSelect = document.getElementById('dateSelect');
            currentDate = dateSelect.value;

            if (!currentCamera || !currentDate) {
                document.getElementById('content').innerHTML = '<div class="empty-state">Select a date to view images</div>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/cameras/${currentCamera}/dates/${currentDate}/images`);
                allImages = await response.json();
                displayedCount = 0;

                document.getElementById('content').innerHTML = '<div class="image-grid" id="imageGrid"></div><div class="load-more"></div>';

                if (allImages.length === 0) {
                    document.getElementById('content').innerHTML = '<div class="empty-state">No images found for this date</div>';
                    return;
                }

                displayMoreImages();
            } catch (error) {
                console.error('Error loading images:', error);
                document.getElementById('content').innerHTML = '<div class="empty-state">Error loading images</div>';
            }
        }

        function displayMoreImages() {
            const grid = document.getElementById('imageGrid');
            const endIndex = Math.min(displayedCount + IMAGES_PER_PAGE, allImages.length);

            for (let i = displayedCount; i < endIndex; i++) {
                const filename = allImages[i];
                const imageUrl = `/images/${currentCamera}/${currentDate}/${filename}`;

                const div = document.createElement('div');
                div.className = 'image-item';
                div.innerHTML = '<div class="image-item-placeholder">Loading...</div>';
                div.onclick = () => openModal(imageUrl, filename);

                const img = document.createElement('img');
                img.src = imageUrl;
                img.onload = () => {
                    div.innerHTML = '';
                    div.appendChild(img);
                    img.classList.add('loaded');
                };
                img.onerror = () => {
                    div.innerHTML = '<div class="image-item-placeholder">Failed to load</div>';
                };

                grid.appendChild(div);
            }

            displayedCount = endIndex;

            // Update load more button
            const loadMoreBtn = document.querySelector('.load-more');
            loadMoreBtn.innerHTML = '';
            if (displayedCount < allImages.length) {
                const btn = document.createElement('button');
                btn.className = 'load-more-btn';
                btn.textContent = `Load More (${displayedCount}/${allImages.length})`;
                btn.onclick = displayMoreImages;
                loadMoreBtn.appendChild(btn);
            } else if (allImages.length > 0) {
                const msg = document.createElement('div');
                msg.style.color = '#666';
                msg.style.fontSize = '12px';
                msg.textContent = `Showing all ${allImages.length} images`;
                loadMoreBtn.appendChild(msg);
            }
        }

        function handleScroll() {
            const content = document.getElementById('content');
            const scrollPercentage = (content.scrollTop + content.clientHeight) / content.scrollHeight;

            if (scrollPercentage > 0.8 && displayedCount < allImages.length) {
                displayMoreImages();
            }
        }

        function openModal(imageUrl, filename) {
            document.getElementById('modalImage').src = imageUrl;
            document.getElementById('modalInfo').textContent = filename;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        init();
    </script>
</body>
</html>
